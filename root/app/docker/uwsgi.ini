[uwsgi]
; FreeBSD: full paths for venv-installed binaries

; Wait for Redis before accepting requests
exec-pre = /dispatcharrpy/bin/python /app/scripts/wait_for_redis.py

; Attach-daemon managed services (uWSGI master supervises these)
attach-daemon = /usr/bin/nice -n $(CELERY_NICE_LEVEL) /dispatcharrpy/bin/celery -A dispatcharr worker --autoscale=6,1
attach-daemon = /usr/bin/nice -n $(CELERY_NICE_LEVEL) /dispatcharrpy/bin/celery -A dispatcharr beat
attach-daemon = /dispatcharrpy/bin/daphne -b 0.0.0.0 -p 8001 dispatcharr.asgi:application

; Core settings
chdir = /app
module = dispatcharr.wsgi:application
virtualenv = /dispatcharrpy
master = true
env = DJANGO_SETTINGS_MODULE=dispatcharr.settings
env = USE_NGINX_ACCEL=true
socket = /app/uwsgi.sock
chmod-socket = 777
vacuum = true
die-on-term = true
static-map = /static=/app/static

; HTTP endpoint for stream output and logo proxy
http = 0.0.0.0:5656
http-keepalive = 1

; Workers
workers = 4
gevent = 400
buffer-size = 65536
post-buffering = 4096
http-timeout = 600
socket-timeout = 600
lazy-apps = true
thunder-lock = true

; Logging
log-master = true
log-4xx = true
log-5xx = true
disable-logging = false
logformat-strftime = true
log-date = %%Y-%%m-%%d %%H:%%M:%%S,000
