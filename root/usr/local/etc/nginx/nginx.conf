worker_processes 1;
user bsd bsd;

events {
    worker_connections 1024;
}

http {
    include      /usr/local/etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    proxy_cache_path /data/logo_cache levels=1:2 keys_zone=logo_cache:10m
                     inactive=24h use_temp_path=off;

    server {
        listen 9191;
        listen [::]:9191;

        proxy_connect_timeout 75;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        client_max_body_size 0;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host:$server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Serve Django via uWSGI unix socket
        location / {
            include /usr/local/etc/nginx/uwsgi_params;
            uwsgi_pass unix:/app/uwsgi.sock;
        }

        location /assets/ {
            root /app/static;
        }

        location /static/ {
            root /app;
        }

        location /logos/ {
            root /data;
        }

        # Internal location for X-Accel-Redirect backup downloads
        location /protected-backups/ {
            internal;
            alias /data/backups/;
        }

        location ~ ^/api/logos/(?<logo_id>\d+)/cache/ {
            proxy_pass http://127.0.0.1:5656;
            proxy_cache logo_cache;
            proxy_cache_key "$scheme$request_uri";
            proxy_cache_valid 200 24h;
            proxy_cache_use_stale error timeout updating;
        }

        location ~ ^/api/channels/logos/(?<logo_id>\d+)/cache/ {
            proxy_pass http://127.0.0.1:5656;
            proxy_cache logo_cache;
            proxy_cache_key "$scheme$request_uri";
            proxy_cache_valid 200 24h;
            proxy_cache_use_stale error timeout updating;
        }

        # admin disabled in production
        location ~ ^/admin/?$ {
            return 301 /login;
        }

        location /hdhr {
            include /usr/local/etc/nginx/uwsgi_params;
            uwsgi_pass unix:/app/uwsgi.sock;
        }

        # Serve FFmpeg streams without buffering
        location /output/stream/ {
            proxy_pass http://127.0.0.1:5656;
            proxy_buffering off;
            proxy_set_header Connection keep-alive;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
        }

        # WebSockets — Daphne on port 8001
        location /ws/ {
            proxy_pass http://127.0.0.1:8001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }

        location /proxy/ {
            include /usr/local/etc/nginx/uwsgi_params;
            uwsgi_pass unix:/app/uwsgi.sock;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            client_max_body_size 0;
        }
    }
}
